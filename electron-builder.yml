appId: com.beeefx.polyclaude
productName: polyclaude
copyright: © BeeeFX

# Ship unpacked (no asar): the bundled CLI shim re-runs this app's binary in
# Node mode against dist/cli/index.js, and node-pty's native prebuild loads from
# disk — both are simplest and most reliable when files aren't inside an archive.
asar: false

# node-pty 1.1.0 ships N-API prebuilds that load under Electron 33 as-is, so do
# NOT let electron-builder rebuild native deps from source (winpty's build needs
# a toolchain we don't have, and the prebuild is what `npm run gui` already uses).
npmRebuild: false

directories:
  output: release
  buildResources: build

# Keep electron-builder's default inclusion (**/* + production node_modules,
# dev deps auto-pruned) and only TRIM source/test bloat. NOTE: these must all be
# negations — an include-only list would drop node_modules and ship a broken app.
files:
  - "!src/**"
  - "!test/**"
  - "!scripts/**"
  - "!.github/**"
  - "!**/*.{map,ts,tsx}"
  - "!**/tsconfig*.json"
  - "!{vite.config.ts,electron-builder.yml,CHANGELOG.md,README.md}"

extraMetadata:
  main: dist/main/index.js

# We don't ship an auto-updater, so don't publish the auto-update files
# (latest*.yml + .blockmap) — nobody hand-downloads those; they'd just clutter
# the Releases page. publishAutoUpdate:false skips uploading them; nsis's own
# differentialPackage:false drops the installer blockmap. Re-enable if
# electron-updater is added later.
publish:
  provider: github
  publishAutoUpdate: false

win:
  target:
    - target: nsis
      arch: [x64]
    - target: zip # portable, no-install build (also used to smoke-test packaging)
      arch: [x64]
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: false # per-user install → no admin prompt
  allowToChangeInstallationDirectory: true
  include: build/installer.nsh
  deleteAppDataOnUninstall: false
  differentialPackage: false
  artifactName: ${productName}-${version}-Setup.${ext}

mac:
  category: public.app-category.developer-tools
  icon: build/icon.png
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  # Unsigned builds: the app is ad-hoc signed so it runs after a right-click→Open.
  identity: null

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}

linux:
  category: Development
  icon: build/icon.png
  target:
    - AppImage
